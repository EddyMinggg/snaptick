[providers]
- "php"
- "node"

[variables]
# 限制 Node 記憶體避免 137 錯誤
NODE_OPTIONS = "--max_old_space_size=512"
# 允許 Root 執行（消除警告）
COMPOSER_ALLOW_SUPERUSER = "1"

[phases.setup]
# 強制指定系統套件為 php84，確保 Laravel 11/13 需要的最低版本
nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.install]
# 直接使用 --ignore-platform-reqs 參數，確保 Composer 忽略版本檢查
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction --ignore-platform-reqs",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"