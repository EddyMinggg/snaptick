[providers]
- "php"
- "node"

[variables]
# 限制 Node 記憶體避免 137 錯誤
NODE_OPTIONS = "--max_old_space_size=512"
# 允許 Root 執行（消除警告）
COMPOSER_ALLOW_SUPERUSER = "1"
# 這是最關鍵的一行！強迫 Composer 忽略版本檢查，直接安裝
COMPOSER_IGNORE_PLATFORM_REQS = "1"

[phases.setup]
# 強制指定系統套件：這裡我們不再依賴 Nixpacks 的猜測，直接安裝 php84
nixPkgs = ["php84", "php84Packages.composer", "nodejs"]

[phases.install]
# 我們在這裡手動帶入環境變數，確保 composer install 時 100% 忽略平台檢查
cmds = [
    "COMPOSER_IGNORE_PLATFORM_REQS=1 composer install --optimize-autoloader --no-dev --no-interaction",
    "npm ci",
    "npm run build"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache",
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"